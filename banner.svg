<svg width="1584" height="396" viewBox="0 0 1584 396" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Grid pattern -->
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(0,201,255,0.04)" stroke-width="1"/>
    </pattern>
    <!-- Grid mask -->
    <radialGradient id="gridMask" cx="50%" cy="50%" r="50%">
      <stop offset="30%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <mask id="gridFade">
      <rect width="1584" height="396" fill="url(#gridMask)"/>
    </mask>
    <!-- Orb gradients -->
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00C9FF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00C9FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7B61FF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#7B61FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF2D78" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#FF2D78" stop-opacity="0"/>
    </radialGradient>
    <!-- Separator gradient -->
    <linearGradient id="hline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00C9FF" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#00C9FF" stop-opacity="0.15"/>
      <stop offset="80%"  stop-color="#00C9FF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00C9FF" stop-opacity="0"/>
    </linearGradient>
    <!-- Blur filter for orbs -->
    <filter id="blur80" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="#0D1117"/>

  <!-- Grid -->
  <rect width="1584" height="396" fill="url(#grid)" mask="url(#gridFade)"/>

  <!-- Orbs -->
  <ellipse cx="380" cy="80"  rx="250" ry="150" fill="url(#orb1)" filter="url(#blur80)"/>
  <ellipse cx="1200" cy="280" rx="200" ry="200" fill="url(#orb2)" filter="url(#blur80)"/>
  <ellipse cx="1400" cy="100" rx="150" ry="100" fill="url(#orb3)" filter="url(#blur80)"/>

  <!-- Top border line -->
  <rect x="0" y="0" width="1584" height="1" fill="url(#hline)"/>
  <!-- Bottom border line -->
  <rect x="0" y="395" width="1584" height="1" fill="url(#hline)"/>

  <!-- Corner accents -->
  <path d="M1584,0 L1464,0" stroke="#00C9FF" stroke-width="1" opacity="0.15"/>
  <path d="M1584,0 L1584,120" stroke="#00C9FF" stroke-width="1" opacity="0.15"/>
  <path d="M0,396 L80,396" stroke="#7B61FF" stroke-width="1" opacity="0.15"/>
  <path d="M0,396 L0,316" stroke="#7B61FF" stroke-width="1" opacity="0.15"/>

  <!-- ══ CUBE (centered at 792, 164) — corrected isometric proportions ══ -->
  <!-- Top face -->
  <polygon points="792,88 864,126 792,164 720,126"
           fill="rgba(0,201,255,0.07)" stroke="#00C9FF" stroke-width="2" stroke-linejoin="round"/>
  <!-- Right face -->
  <polygon points="864,126 864,202 792,240 792,164"
           fill="rgba(123,97,255,0.07)" stroke="#7B61FF" stroke-width="2" stroke-linejoin="round" opacity="0.85"/>
  <!-- Left face -->
  <polygon points="720,126 792,164 792,240 720,202"
           fill="rgba(255,45,120,0.05)" stroke="#FF2D78" stroke-width="2" stroke-linejoin="round" opacity="0.6"/>
  <!-- Vertical edges -->
  <line x1="792" y1="164" x2="792" y2="240" stroke="#00C9FF" stroke-width="1.5" opacity="0.35"/>
  <line x1="864" y1="126" x2="864" y2="202" stroke="#7B61FF" stroke-width="2"   opacity="0.6"/>
  <line x1="720" y1="126" x2="720" y2="202" stroke="#FF2D78" stroke-width="2"   opacity="0.45"/>
  <!-- Corner dots -->
  <circle cx="792" cy="88"  r="5" fill="#00C9FF"/>
  <circle cx="864" cy="126" r="5" fill="#7B61FF"/>
  <circle cx="720" cy="126" r="5" fill="#FF2D78"/>
  <circle cx="792" cy="164" r="4" fill="#00C9FF" opacity="0.6"/>

  <!-- ══ WORDMARK ══ -->
  <text x="792" y="290"
        text-anchor="middle"
        font-family="'Outfit','Helvetica Neue',Arial,sans-serif"
        font-size="48"
        letter-spacing="2"
        fill="#E6EDF3">
    <tspan font-weight="600">Nexus </tspan><tspan font-weight="300" fill="#8B949E">Labs </tspan><tspan font-weight="600" fill="#00C9FF">AI</tspan>
  </text>

  <!-- .dev -->
  <text x="792" y="320"
        text-anchor="middle"
        font-family="'JetBrains Mono','Courier New',monospace"
        font-weight="400"
        font-size="17"
        letter-spacing="5"
        fill="#00C9FF"
        opacity="0.75">.dev</text>
</svg>
